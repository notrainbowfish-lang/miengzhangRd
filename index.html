<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Firebase 連線測試</title>
<style>
body{margin:0;background:#fffaf6;font-family:"Noto Serif CJK JP","Microsoft JhengHei",serif;color:#4b3128}
.wrap{max-width:900px;margin:40px auto;padding:24px}
.card{background:#fffdf9;border:1px solid #ead9cd;border-radius:24px;padding:24px;margin-bottom:18px;box-shadow:0 10px 30px rgba(95,56,35,.08)}
h1,h2{margin-top:0;letter-spacing:.08em}
button{border:1px solid #ead9cd;background:#fff;border-radius:12px;padding:10px 14px;cursor:pointer;margin-right:8px;margin-bottom:8px;font:inherit}
button:hover{background:#fff7f1}
.log{background:#fff;border:1px solid #ead9cd;border-radius:14px;padding:12px;min-height:120px;white-space:pre-wrap;line-height:1.7;overflow:auto}
.ok{color:#4f9b54}
.err{color:#b54d52}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h1>Firebase / Firestore 連線測試</h1>
<p>這頁只測試：</p>
<ul>
<li>Firebase 初始化</li>
<li>Firestore 是否能讀</li>
<li>Firestore 是否能新增</li>
</ul>
</div>

<div class="card">
<h2>測試按鈕</h2>

<button id="testFirebase">1. Firebase 初始化</button>
<button id="readExternal">2. 讀 externalMembers</button>
<button id="readContract">3. 讀 contractMembers</button>
<button id="readManagers">4. 讀 managers</button>
<button id="writeRequest">5. 新增 externalRequests 測試資料</button>

</div>

<div class="card">
<h2>測試結果</h2>
<div id="log" class="log"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const logEl = document.getElementById("log");

function log(msg,type=""){
  const div=document.createElement("div");
  div.textContent=msg;
  if(type) div.className=type;
  logEl.prepend(div);
  console.log(msg);
}

let app=null;
let db=null;

const firebaseConfig = {
  apiKey: "AIzaSyDDN2B2iOd096JVRDvsUyCxEC_ANgHRhRY",
  authDomain: "minzhuang-space-b9430.firebaseapp.com",
  projectId: "minzhuang-space-b9430",
  storageBucket: "minzhuang-space-b9430.firebasestorage.app",
  messagingSenderId: "142096356022",
  appId: "1:142096356022:web:af8e7a8ef8f79050c6cc17"
};

document.getElementById("testFirebase").onclick=()=>{

  try{
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    log("Firebase 初始化成功","ok");
  }catch(err){
    log("Firebase 初始化失敗："+err.message,"err");
  }

};

async function readCollection(name){

  try{

    if(!db){
      log("請先初始化 Firebase","err");
      return;
    }

    const snap = await getDocs(collection(db,name));

    log(`成功讀取 ${name} ｜共 ${snap.size} 筆`,"ok");

  }catch(err){

    log(`讀取 ${name} 失敗：${err.message}`,"err");

  }

}

document.getElementById("readExternal").onclick=()=>{
  readCollection("externalMembers");
};

document.getElementById("readContract").onclick=()=>{
  readCollection("contractMembers");
};

document.getElementById("readManagers").onclick=()=>{
  readCollection("managers");
};

document.getElementById("writeRequest").onclick=async()=>{

  try{

    if(!db){
      log("請先初始化 Firebase","err");
      return;
    }

    await addDoc(collection(db,"externalRequests"),{

      name:"測試使用者",
      phone:"0900000000",
      date:"2026-05-10",
      period:"morning",
      space:"room41",
      purpose:"Firebase 測試",
      status:"pending",
      createdAt:serverTimestamp()

    });

    log("成功新增 externalRequests 測試資料","ok");

  }catch(err){

    log("新增 externalRequests 失敗："+err.message,"err");

  }

};

log("頁面已載入，可開始測試");

</script>

</body>
</html>
