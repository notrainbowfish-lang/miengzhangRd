<!DOCTYPE html><html lang='zh-Hant'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>共享空間系統 v3</title><style>body{margin:0;background:#fffaf6;font-family:'Microsoft JhengHei',sans-serif;color:#4b3128}.app{max-width:1400px;margin:auto;padding:20px}.card{background:#fffdf9;border:1px solid #eadcd0;border-radius:28px;overflow:hidden}header{display:grid;grid-template-columns:1fr auto;padding:24px;border-bottom:1px solid #eadcd0}h1{margin:0;font-weight:500}button{border:1px solid #eadcd0;background:#fff;border-radius:12px;padding:10px 14px;cursor:pointer}.top{display:flex;gap:8px;flex-wrap:wrap}.layout{display:grid;grid-template-columns:1fr 340px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid #eadcd0;border-radius:18px;overflow:hidden}.weekday,.day{border-right:1px solid #eadcd0;border-bottom:1px solid #eadcd0}.weekday{padding:12px;text-align:center;background:#fbefe8}.day{min-height:150px;padding:8px;background:#fffdf9}.space{padding:8px;border-radius:12px;margin-bottom:6px;border:1px solid #eadcd0;background:#fff;cursor:pointer}.panel{background:#fffdf9;border:1px solid #eadcd0;border-radius:20px;padding:18px;margin:18px}.green{background:#dff0d7}.yellow{background:#ffe6b8}.red{background:#ffd8d8}.modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.modal-box{background:#fffdf9;border-radius:24px;padding:24px;width:min(680px,100%)}input,select,textarea{width:100%;padding:10px;border:1px solid #eadcd0;border-radius:12px;margin-top:6px}textarea{min-height:90px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.admin-panel{display:none}.admin-mode .admin-panel{display:block}</style></head><body><div class='app'><div class='card'><header><div><h1>共享空間系統 v3</h1><div>公開月曆｜登入｜預約｜管理後台</div></div><div class='top'><button onclick="openModal('externalModal')">外部會員</button><button onclick="openModal('contractModal')">特約會員</button><button onclick="openModal('adminModal')">管理員登入</button></div></header><div class='layout'><main style='padding:20px'><div class='calendar' id='calendar'></div></main><aside><div class='panel'><h2>空間說明</h2><div>39前｜3格，可私密<br>39後｜1格<br>41｜外部與特約可用</div></div><div class='panel admin-panel'><h2>管理後台</h2><select><option>前台月曆預覽</option><option>預約狀態月曆</option><option>預約管理／匯款</option><option>外部使用者管理</option><option>特約使用者管理</option><option>管理員管理</option><option>歷史紀錄</option></select></div></aside></div></div></div><div id='requestModal' class='modal'><div class='modal-box'><h2>空間預約申請</h2><label>日期<input type='date'></label><br><br><label>空間<select><option>39前｜🟠🟢🟢</option><option>39後｜🔴</option><option>41｜🟢</option></select></label><br><br><label>時段<select><option>上午</option><option>下午</option></select></label><br><br><label><input type='checkbox' style='width:auto'> 私密使用</label><div class='grid2'><label>使用者<input value='系統自動帶入' readonly></label><label>聯繫資料<input value='系統自動帶入' readonly></label></div><br><label>使用內容<input placeholder='牌卡／療癒／課程'></label><br><br><label>備註<textarea placeholder='聯繫改其他人等'></textarea></label><br><div style='display:flex;gap:8px;justify-content:flex-end'><button onclick="closeModal('requestModal')">取消</button><button>送出申請</button></div></div></div><div id='externalModal' class='modal'><div class='modal-box'><h2>外部會員</h2><div class='grid2'><label>帳號<input></label><label>密碼<input type='password'></label></div><br><div style='display:flex;gap:8px;justify-content:flex-end'><button onclick="closeModal('externalModal')">取消</button><button>登入</button><button>註冊</button></div></div></div><div id='contractModal' class='modal'><div class='modal-box'><h2>特約會員</h2><div class='grid2'><label>帳號<input></label><label>密碼<input type='password'></label></div><br><div style='display:flex;gap:8px;justify-content:flex-end'><button onclick="closeModal('contractModal')">取消</button><button>登入</button><button>特約申請</button></div></div></div><div id='adminModal' class='modal'><div class='modal-box'><h2>管理員登入</h2><div class='grid2'><label>名稱<input></label><label>密碼<input type='password'></label></div><br><div style='display:flex;gap:8px;justify-content:flex-end'><button onclick="closeModal('adminModal')">取消</button><button onclick='enableAdmin()'>登入管理後台</button></div></div></div><script>function openModal(id){document.getElementById(id).classList.add('show')}function closeModal(id){document.getElementById(id).classList.remove('show')}function enableAdmin(){document.body.classList.add('admin-mode');closeModal('adminModal')}const c=document.getElementById('calendar');['日','一','二','三','四','五','六'].forEach(w=>{const d=document.createElement('div');d.className='weekday';d.textContent=w;c.appendChild(d)});for(let i=1;i<=31;i++){const d=document.createElement('div');d.className='day';d.innerHTML=`<div style='font-weight:700;margin-bottom:8px'>${i}</div><div class='space green' onclick="openModal('requestModal')"><b>39前</b><br>🟠🟢🟢</div><div class='space red'><b>39後</b><br>🔴</div><div class='space green' onclick="openModal('requestModal')"><b>41</b><br>🟢</div>`;c.appendChild(d)}</script></body></html>
